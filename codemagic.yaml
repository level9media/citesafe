workflows:
  ios-app-store:
    name: CiteSafe iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CiteSafeKey

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.levenninemedia.citesafe
      vars:
        BUNDLE_ID: com.levenninemedia.citesafe
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APPLE_TEAM_ID: U2PT554FKN
      node: 22.13.0

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: pnpm build

      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" --platform IOS 2>/dev/null || echo 0) + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Build IPA (automatic signing)
        script: |
          xcode-project use-profiles --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
