workflows:
  ios-app-store:
    name: CiteSafe iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CiteSafeKey

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.levelninemedia.citesafe
      vars:
        BUNDLE_ID: com.levelninemedia.citesafe
        # FIX 2: Capacitor 8 uses SPM — no standalone App.xcworkspace, use xcodeproj directly
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APPLE_TEAM_ID: U2PT554FKN
      node: 22.13.0

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force || true
          pnpm --version

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: |
          pnpm build
          # Verify dist was created — Vite outputs to dist/public/, cap sync needs this
          ls -la dist/public/index.html || (echo "ERROR: dist/public/index.html missing" && exit 1)

      - name: Set build number
        script: |
          # Patch capacitor.config.ts BEFORE cap add ios so the version is baked in from the start
          # This is the only reliable method — patching after generation gets overwritten
          # Add offset of 100 so build number is always > 1 (Apple already has build 1)
          EFFECTIVE_BUILD=$((BUILD_NUMBER + 100))
          echo "BUILD_NUMBER=$BUILD_NUMBER, EFFECTIVE_BUILD=$EFFECTIVE_BUILD"
          node -e "
            const fs = require('fs');
            const buildNum = process.env.EFFECTIVE_BUILD || '101';
            let cfg = fs.readFileSync('capacitor.config.ts', 'utf8');
            // Remove any existing buildNumber lines to avoid duplicates
            cfg = cfg.replace(/\\n\\s*buildNumber:.*,/g, '');
            // Inject buildNumber into ios block
            cfg = cfg.replace(
              /ios: \\{/,
              'ios: {\\n    buildNumber: \'' + buildNum + '\',' 
            );
            fs.writeFileSync('capacitor.config.ts', cfg);
            console.log('capacitor.config.ts updated with buildNumber:', buildNum);
          "
          cat capacitor.config.ts

      - name: Generate iOS platform
        script: |
          # ios/ is gitignored — must generate fresh every build
          # Build number is already injected into capacitor.config.ts above
          node_modules/.bin/cap add ios 2>/dev/null || true
          node_modules/.bin/cap sync ios
          echo "=== iOS platform structure ==="
          find ios/App -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Info.plist" | sort
          echo "=== Verifying build number in Info.plist ==="
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ios/App/App/Info.plist

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          # FIX 2: Capacitor 8 SPM — correct workspace path is inside xcodeproj, not App.xcworkspace
          # FIX 4: Use --project flag with App scheme (no separate .xcscheme file in SPM setup)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
