workflows:
  ios-app-store:
    name: CiteSafe iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CiteSafeKey

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.levelninemedia.citesafe
      vars:
        BUNDLE_ID: com.levelninemedia.citesafe
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APPLE_TEAM_ID: U2PT554FKN
      node: 22.13.0

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force || true
          pnpm --version

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: |
          pnpm build
          ls -la dist/public/index.html || (echo "ERROR: dist/public/index.html missing" && exit 1)

      - name: Generate iOS platform
        script: |
          node_modules/.bin/cap add ios 2>/dev/null || true
          node_modules/.bin/cap sync ios

      - name: Inject app icon
        script: |
          # Copy pre-built AppIcon.appiconset from repo into the generated iOS project
          ICON_DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          echo "Copying icons to $ICON_DEST"
          cp -r ios-assets/AppIcon.appiconset/. "$ICON_DEST/"
          echo "=== Icon files in place ==="
          ls "$ICON_DEST/"

      - name: Register citesafe:// URL scheme for OAuth deep link
        script: |
          # Required for @capacitor/browser OAuth flow:
          # SFSafariViewController redirects to citesafe://auth/callback after login.
          # Without this entry in Info.plist, iOS silently drops the deep link
          # and the user stays stuck in the in-app browser after authenticating.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.levelninemedia.citesafe" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string citesafe" "$PLIST" 2>/dev/null || true
          echo "=== CFBundleURLTypes in Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$PLIST"

      - name: Set build number
        script: |
          EFFECTIVE_BUILD=$((BUILD_NUMBER + 100))
          echo "Codemagic BUILD_NUMBER=$BUILD_NUMBER, EFFECTIVE_BUILD=$EFFECTIVE_BUILD"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $EFFECTIVE_BUILD" ios/App/App/Info.plist
          cd ios/App && xcrun agvtool new-version -all $EFFECTIVE_BUILD && cd ../..
          echo "=== CFBundleVersion in Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
