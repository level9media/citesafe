workflows:
  ios-app-store:
    name: CiteSafe iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CiteSafeKey

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.levelninemedia.citesafe
      vars:
        BUNDLE_ID: com.levelninemedia.citesafe
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APPLE_TEAM_ID: U2PT554FKN
      node: 22.13.0

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force || true
          pnpm --version

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: |
          pnpm build
          ls -la dist/public/index.html || (echo "ERROR: dist/public/index.html missing" && exit 1)

      - name: Generate iOS platform
        script: |
          node_modules/.bin/cap add ios 2>/dev/null || true
          node_modules/.bin/cap sync ios

      - name: Set build number
        script: |
          # Use BUILD_NUMBER env var provided by Codemagic, offset by 100 to exceed Apple's existing build 1
          EFFECTIVE_BUILD=$((BUILD_NUMBER + 100))
          echo "Codemagic BUILD_NUMBER=$BUILD_NUMBER, EFFECTIVE_BUILD=$EFFECTIVE_BUILD"
          # Set CFBundleVersion directly in Info.plist using PlistBuddy
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $EFFECTIVE_BUILD" ios/App/App/Info.plist
          # Also set CURRENT_PROJECT_VERSION in the Xcode project via agvtool
          cd ios/App && xcrun agvtool new-version -all $EFFECTIVE_BUILD && cd ../..
          # Verify
          echo "=== CFBundleVersion in Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
