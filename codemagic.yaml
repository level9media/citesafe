workflows:
  ios-app-store:
    name: CiteSafe iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CiteSafeKey

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.levelninemedia.citesafe
      vars:
        BUNDLE_ID: com.levelninemedia.citesafe
        # FIX 2: Capacitor 8 uses SPM — no standalone App.xcworkspace, use xcodeproj directly
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APPLE_TEAM_ID: U2PT554FKN
      node: 22.13.0

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force || true
          pnpm --version

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: |
          pnpm build
          # Verify dist was created — Vite outputs to dist/public/, cap sync needs this
          ls -la dist/public/index.html || (echo "ERROR: dist/public/index.html missing" && exit 1)

      - name: Generate iOS platform
        script: |
          # ios/ is gitignored — must generate fresh every build
          # FIX 1: use local node_modules/.bin/cap (already installed via pnpm install)
          node_modules/.bin/cap add ios 2>/dev/null || true
          node_modules/.bin/cap sync ios
          echo "=== iOS platform structure ==="
          find ios/App -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Info.plist" | sort

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          # FIX 3: Use agvtool to set CURRENT_PROJECT_VERSION in pbxproj (not PlistBuddy on Info.plist)
          # Info.plist uses $(CURRENT_PROJECT_VERSION) variable — must set it in the project
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" --platform IOS 2>/dev/null || echo 0) + 1))
          echo "Setting build number to: $BUILD_NUMBER"
          cd ios/App
          xcrun agvtool new-version -all $BUILD_NUMBER
          cd ../..

      - name: Build IPA
        script: |
          # FIX 2: Capacitor 8 SPM — correct workspace path is inside xcodeproj, not App.xcworkspace
          # FIX 4: Use --project flag with App scheme (no separate .xcscheme file in SPM setup)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
